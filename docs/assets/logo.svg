<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320" role="img" aria-label="harness-sync logo">
  <title>harness-sync</title>
  <desc>A central hub connected to seven satellite nodes representing supported LLM harnesses.</desc>

  <defs>
    <linearGradient id="hubGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Connections from hub to each node -->
  <g stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.55" stroke-dasharray="4 3" fill="none">
    <line x1="160" y1="160" x2="160"   y2="30"/>
    <line x1="160" y1="160" x2="261.6" y2="78.9"/>
    <line x1="160" y1="160" x2="286.7" y2="188.9"/>
    <line x1="160" y1="160" x2="216.4" y2="277.1"/>
    <line x1="160" y1="160" x2="103.6" y2="277.1"/>
    <line x1="160" y1="160" x2="33.3"  y2="188.9"/>
    <line x1="160" y1="160" x2="58.4"  y2="78.9"/>
  </g>

  <!-- Satellite nodes -->
  <g fill="#f1f5f9" stroke="#0ea5e9" stroke-width="2">
    <circle cx="160"   cy="30"    r="14"/>
    <circle cx="261.6" cy="78.9"  r="14"/>
    <circle cx="286.7" cy="188.9" r="14"/>
    <circle cx="216.4" cy="277.1" r="14"/>
    <circle cx="103.6" cy="277.1" r="14"/>
    <circle cx="33.3"  cy="188.9" r="14"/>
    <circle cx="58.4"  cy="78.9"  r="14"/>
  </g>

  <!-- Hub -->
  <g filter="url(#softGlow)">
    <circle cx="160" cy="160" r="46" fill="url(#hubGradient)" stroke="#0c4a6e" stroke-width="2"/>
  </g>

  <!-- Sync arrows inside hub -->
  <g fill="none" stroke="#f0f9ff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 140 152 A 18 18 0 0 1 174 148"/>
    <polyline points="170,140 175,148 167,151"/>
    <path d="M 180 168 A 18 18 0 0 1 146 172"/>
    <polyline points="150,180 145,172 153,169"/>
  </g>
</svg>
