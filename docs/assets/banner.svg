<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="harness-sync banner">
  <title>harness-sync</title>
  <desc>harness-sync banner: a sync hub connecting seven LLM harnesses with a wordmark and tagline.</desc>

  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="hubGradient2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bgGradient)" rx="16"/>

  <!-- Subtle grid -->
  <g stroke="#1e3a5f" stroke-width="1" opacity="0.4">
    <line x1="0"   y1="80"  x2="1200" y2="80"/>
    <line x1="0"   y1="160" x2="1200" y2="160"/>
    <line x1="0"   y1="240" x2="1200" y2="240"/>
  </g>

  <!-- Logo group: hub + 7 nodes, centered around (200, 160), radius 110 -->
  <g transform="translate(200,160)">
    <!-- Connections -->
    <g stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.5" stroke-dasharray="4 3" fill="none">
      <line x1="0" y1="0" x2="0"      y2="-110"/>
      <line x1="0" y1="0" x2="85.99"  y2="-68.59"/>
      <line x1="0" y1="0" x2="107.24" y2="24.48"/>
      <line x1="0" y1="0" x2="47.73"  y2="99.1"/>
      <line x1="0" y1="0" x2="-47.73" y2="99.1"/>
      <line x1="0" y1="0" x2="-107.24" y2="24.48"/>
      <line x1="0" y1="0" x2="-85.99" y2="-68.59"/>
    </g>

    <!-- Satellite nodes -->
    <g fill="#0f172a" stroke="#7dd3fc" stroke-width="2">
      <circle cx="0"       cy="-110"  r="12"/>
      <circle cx="85.99"   cy="-68.59" r="12"/>
      <circle cx="107.24"  cy="24.48" r="12"/>
      <circle cx="47.73"   cy="99.1"  r="12"/>
      <circle cx="-47.73"  cy="99.1"  r="12"/>
      <circle cx="-107.24" cy="24.48" r="12"/>
      <circle cx="-85.99"  cy="-68.59" r="12"/>
    </g>

    <!-- Hub -->
    <circle cx="0" cy="0" r="38" fill="url(#hubGradient2)" stroke="#0c4a6e" stroke-width="2"/>

    <!-- Sync arrows -->
    <g fill="none" stroke="#f0f9ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -16 -6 A 15 15 0 0 1 12 -10"/>
      <polyline points="8,-17 13,-10 5,-7"/>
      <path d="M 16 6 A 15 15 0 0 1 -12 10"/>
      <polyline points="-8,17 -13,10 -5,7"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace">
    <text x="400" y="155" font-size="72" font-weight="700" fill="url(#textGradient)" letter-spacing="-2">
      harness-sync
    </text>
    <text x="400" y="200" font-size="22" font-weight="400" fill="#94a3b8" letter-spacing="1">
      one config, every harness
    </text>
    <text x="400" y="240" font-size="14" font-weight="400" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif">
      claude-code  ·  crush  ·  kilo  ·  opencode  ·  goose  ·  cagent  ·  zed
    </text>
  </g>
</svg>
